<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Confirming your account — ListDirect</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a0f0d;--green:#3ef07a;--text:#e8f0e9;--muted:#7a9480;--card:#141c16;--border:#1f2d22;--red:#e85454}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.box{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:48px 40px;max-width:440px;width:100%;text-align:center}
.logo{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;color:#fff;margin-bottom:32px}
.logo span{color:var(--green)}
.icon{font-size:3rem;margin-bottom:16px}
h2{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:900;color:#fff;margin-bottom:10px}
p{color:var(--muted);font-size:0.92rem;margin-bottom:24px;line-height:1.6}
.btn{display:inline-block;background:var(--green);color:#0a0f0d;padding:13px 32px;border-radius:50px;font-weight:700;font-size:1rem;text-decoration:none;transition:all 0.2s}
.btn:hover{box-shadow:0 6px 24px rgba(62,240,122,0.4)}
.error{color:var(--red);font-size:0.88rem;margin-bottom:16px}
</style>
</head>
<body>
<div class="box">
  <div class="logo">List<span>Direct</span></div>
  <div id="content">
    <div class="icon">⏳</div>
    <h2>Confirming your account…</h2>
    <p>Please wait a moment.</p>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://pscxbpgszpajkwqvuajq.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBzY3hicGdzenBhamtvcXZ1YWpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE0NzgwNDksImV4cCI6MjA1NzA1NDA0OX0.KImP43xdaqWdwyqzNakvmhVzIU3DltCFhek5WsgPWw0';

async function confirm() {
  const params = new URLSearchParams(window.location.search);
  const tokenHash = params.get('token_hash') || params.get('token');
  const type = params.get('type') || 'signup';

  if (!tokenHash) {
    showError('No confirmation token found. Please check your email link.');
    return;
  }

  try {
    const res = await fetch(SUPABASE_URL + '/auth/v1/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
      body: JSON.stringify({ token_hash: tokenHash, type })
    });
    const data = await res.json();

    if (res.ok && data.access_token) {
      // Determine where to redirect based on role
      const role = data.user?.user_metadata?.role;
      let redirect = 'dashboard.html';
      if (role === 'buyer') redirect = 'buyer-dashboard.html';
      if (role === 'agent') redirect = 'agent-portal.html';

      document.getElementById('content').innerHTML = `
        <div class="icon">✅</div>
        <h2>Email confirmed!</h2>
        <p>Your account is ready. Click below to sign in.</p>
        <a href="${redirect}" class="btn">Sign In to My Account →</a>
      `;
    } else {
      showError(data.error_description || data.message || 'Confirmation failed. The link may have expired.');
    }
  } catch(e) {
    showError('Connection error. Please try again.');
  }
}

function showError(msg) {
  document.getElementById('content').innerHTML = `
    <div class="icon">❌</div>
    <h2>Confirmation failed</h2>
    <p class="error">${msg}</p>
    <a href="dashboard.html" class="btn">Go to Sign In →</a>
  `;
}

confirm();
</script>
</body>
</html>
