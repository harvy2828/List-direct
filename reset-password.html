<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password — ListDirect</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0f0d;color:#e8f0e9;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.logo{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;color:#fff;margin-bottom:32px;text-decoration:none}
.logo span{color:#3ef07a}
.card{background:#111810;border:1px solid #1f2d22;border-radius:20px;padding:36px;width:100%;max-width:420px}
h2{font-family:'Playfair Display',serif;font-size:1.4rem;color:#fff;margin-bottom:8px}
.sub{color:#7a9480;font-size:0.88rem;margin-bottom:24px}
label{display:block;font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#7a9480;margin-bottom:6px}
input{width:100%;background:#0d1a10;border:1px solid #1f2d22;color:#e8f0e9;padding:13px 16px;border-radius:12px;font-size:0.95rem;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:16px}
input:focus{border-color:#3ef07a}
.btn{width:100%;background:#3ef07a;color:#0a0f0d;border:none;padding:14px;border-radius:50px;font-weight:700;font-size:1rem;cursor:pointer;font-family:'DM Sans',sans-serif}
.msg{padding:12px 16px;border-radius:10px;font-size:0.88rem;margin-bottom:16px;display:none}
.msg.success{background:#1a3d28;border:1px solid rgba(62,240,122,0.3);color:#3ef07a}
.msg.error{background:#3d1a1a;border:1px solid rgba(232,84,84,0.3);color:#e85454}
</style>
</head>
<body>
<a href="/" class="logo">List<span>Direct</span></a>
<div class="card">
  <h2>Set New Password</h2>
  <p class="sub">Enter your new password below.</p>
  <div id="msg" class="msg"></div>
  <div id="form-area">
    <label>New Password</label>
    <input type="password" id="new-pass" placeholder="Enter new password" minlength="6"/>
    <label>Confirm Password</label>
    <input type="password" id="confirm-pass" placeholder="Confirm new password"/>
    <button class="btn" onclick="resetPassword()">Set New Password</button>
  </div>
</div>

<script>
function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

// Extract token from URL - Supabase puts it in hash OR query params
function getTokenFromURL() {
  // Check hash first (#access_token=...)
  const hash = window.location.hash.substring(1);
  const hashParams = new URLSearchParams(hash);
  const hashToken = hashParams.get('access_token');
  const hashType = hashParams.get('type');
  if (hashToken && hashType === 'recovery') return hashToken;

  // Check query params (?access_token=...)  
  const queryParams = new URLSearchParams(window.location.search);
  const queryToken = queryParams.get('access_token');
  const queryType = queryParams.get('type');
  if (queryToken && queryType === 'recovery') return queryToken;

  return null;
}

async function resetPassword() {
  const newPass = document.getElementById('new-pass').value;
  const confirmPass = document.getElementById('confirm-pass').value;
  if (!newPass || !confirmPass) return showMsg('Please fill in both fields.', 'error');
  if (newPass !== confirmPass) return showMsg('Passwords do not match.', 'error');
  if (newPass.length < 6) return showMsg('Password must be at least 6 characters.', 'error');

  const accessToken = getTokenFromURL();
  if (!accessToken) {
    showMsg('Invalid or expired reset link. Please request a new password reset email.', 'error');
    return;
  }

  try {
    const res = await fetch('/api/auth/update-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + accessToken },
      body: JSON.stringify({ password: newPass })
    });
    const data = await res.json();
    if (res.ok) {
      document.getElementById('form-area').style.display = 'none';
      showMsg('Password updated successfully! Redirecting...', 'success');
      setTimeout(() => { window.location.href = '/agent-portal.html'; }, 2500);
    } else {
      showMsg(data.error || 'Failed to reset password. Please try again.', 'error');
    }
  } catch(e) {
    showMsg('Connection error. Please try again.', 'error');
  }
}
</script>
</body>
</html>
