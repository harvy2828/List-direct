<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password — ListDirect</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0f0d;color:#e8f0e9;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.logo{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;color:#fff;margin-bottom:32px;text-decoration:none}
.logo span{color:#3ef07a}
.card{background:#111810;border:1px solid #1f2d22;border-radius:20px;padding:36px;width:100%;max-width:420px}
h2{font-family:'Playfair Display',serif;font-size:1.4rem;color:#fff;margin-bottom:8px}
.sub{color:#7a9480;font-size:0.88rem;margin-bottom:24px}
label{display:block;font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#7a9480;margin-bottom:6px}
input{width:100%;background:#0d1a10;border:1px solid #1f2d22;color:#e8f0e9;padding:13px 16px;border-radius:12px;font-size:0.95rem;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:16px}
input:focus{border-color:#3ef07a}
.btn{width:100%;background:#3ef07a;color:#0a0f0d;border:none;padding:14px;border-radius:50px;font-weight:700;font-size:1rem;cursor:pointer;font-family:'DM Sans',sans-serif}
.msg{padding:12px 16px;border-radius:10px;font-size:0.88rem;margin-bottom:16px;display:none}
.msg.success{background:#1a3d28;border:1px solid rgba(62,240,122,0.3);color:#3ef07a}
.msg.error{background:#3d1a1a;border:1px solid rgba(232,84,84,0.3);color:#e85454}
</style>
</head>
<body>
<a href="/" class="logo">List<span>Direct</span></a>
<div class="card">
  <h2>Set New Password</h2>
  <p class="sub" id="sub-text">Loading...</p>
  <div id="msg" class="msg"></div>
  <div id="form-area" style="display:none">
    <label>New Password</label>
    <input type="password" id="new-pass" placeholder="Enter new password" minlength="6"/>
    <label>Confirm Password</label>
    <input type="password" id="confirm-pass" placeholder="Confirm new password"/>
    <button class="btn" id="submit-btn" onclick="resetPassword()">Set New Password</button>
  </div>
</div>

<script>
const _supabase = window.supabase.createClient(
  'https://pscxbpgszpajkwqvuajq.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBzY3hicGdzenBhamt3cXZ1YWpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3OTY1OTgsImV4cCI6MjA4OTM3MjU5OH0.KImP43xdaqWdwyqzNakvmhVzIU3DltCFhek5WsgPWw0'
);

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

async function init() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  
  // Try access_token first (direct session)
  const accessToken = params.get('access_token');
  const refreshToken = params.get('refresh_token');
  const type = params.get('type');
  
  // Also try token_hash (from email template {{ .Token }})
  const tokenHash = params.get('token_hash') || params.get('token');

  if (accessToken && type === 'recovery') {
    // Set session directly
    const { error } = await _supabase.auth.setSession({
      access_token: accessToken,
      refresh_token: refreshToken || accessToken
    });
    if (!error) {
      document.getElementById('sub-text').textContent = 'Enter your new password below.';
      document.getElementById('form-area').style.display = 'block';
      return;
    }
  }

  // Try verifyOtp with token hash
  if (tokenHash) {
    const { error } = await _supabase.auth.verifyOtp({
      token_hash: tokenHash,
      type: 'recovery'
    });
    if (!error) {
      document.getElementById('sub-text').textContent = 'Enter your new password below.';
      document.getElementById('form-area').style.display = 'block';
      return;
    }
  }

  // Try with {{ .Token }} directly as token_hash
  const rawToken = params.get('access_token') || params.get('token') || params.get('token_hash');
  if (rawToken && !accessToken) {
    const { error } = await _supabase.auth.verifyOtp({
      token_hash: rawToken,
      type: 'recovery'
    });
    if (!error) {
      document.getElementById('sub-text').textContent = 'Enter your new password below.';
      document.getElementById('form-area').style.display = 'block';
      return;
    }
  }

  document.getElementById('sub-text').textContent = 'Invalid or expired reset link.';
  showMsg('Please request a new password reset email from the login page.', 'error');
}

async function resetPassword() {
  const newPass = document.getElementById('new-pass').value;
  const confirmPass = document.getElementById('confirm-pass').value;
  if (!newPass || !confirmPass) return showMsg('Please fill in both fields.', 'error');
  if (newPass !== confirmPass) return showMsg('Passwords do not match.', 'error');
  if (newPass.length < 6) return showMsg('Password must be at least 6 characters.', 'error');
  document.getElementById('submit-btn').textContent = 'Updating...';
  try {
    const { error } = await _supabase.auth.updateUser({ password: newPass });
    if (error) {
      document.getElementById('submit-btn').textContent = 'Set New Password';
      return showMsg(error.message || 'Failed to reset password.', 'error');
    }
    document.getElementById('form-area').style.display = 'none';
    showMsg('Password updated successfully! Redirecting...', 'success');
    setTimeout(() => { window.location.href = '/'; }, 2500);
  } catch(e) {
    document.getElementById('submit-btn').textContent = 'Set New Password';
    showMsg('Connection error. Please try again.', 'error');
  }
}

init();
</script>
</body>
</html>
